<!doctype html>
<html lang="en" class="js">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <meta name="theme-color" content="#060809" />
    <title>Message sent | Sage Schiller</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="standalone">
      <div class="terminal">
        <div class="terminal-bar" aria-hidden="true">
          <span class="dot dot-r"></span><span class="dot dot-y"></span><span class="dot dot-g"></span>
          <span class="terminal-title">sage@hnl:~</span>
        </div>
        <div class="terminal-body t-done">
          <p class="t-cmd">send message.txt</p>
          <p class="t-out">transmission complete, zero packets dropped</p>
          <p class="t-out">thanks for reaching out. I read everything that lands here and will get back to you soon.</p>
        </div>
      </div>
      <a class="button button-primary" href="/">Back to base <span aria-hidden="true">↩</span></a>
    </main>
  </body>
</html>
